<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b0764"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- newspaper -->
  <g transform="rotate(-6 300 200)">
    <rect x="190" y="90" width="220" height="220" rx="10" fill="#e2e8f0"/>
    <text x="210" y="128" font-size="22" font-weight="800" fill="#0f172a">THE DAILY</text>
    <rect x="210" y="142" width="180" height="8" rx="4" fill="#94a3b8"/>
    <rect x="210" y="162" width="180" height="42" rx="4" fill="#cbd5e1"/>
    <rect x="210" y="216" width="180" height="7" rx="3.5" fill="#94a3b8"/>
    <rect x="210" y="230" width="180" height="7" rx="3.5" fill="#94a3b8"/>
    <rect x="210" y="244" width="140" height="7" rx="3.5" fill="#94a3b8"/>
    <rect x="210" y="266" width="180" height="7" rx="3.5" fill="#cbd5e1"/>
    <rect x="210" y="280" width="120" height="7" rx="3.5" fill="#cbd5e1"/>
  </g>
  <!-- FAKE stamp -->
  <g transform="rotate(-14 330 175)">
    <rect x="250" y="148" width="160" height="54" rx="8" fill="none" stroke="#ef4444" stroke-width="6"/>
    <text x="330" y="184" font-size="38" font-weight="900" fill="#ef4444" text-anchor="middle" letter-spacing="2">FAKE</text>
  </g>
  <!-- shield trust badge -->
  <g transform="translate(395 250)">
    <path d="M0 -42 L38 -26 V8 C38 34 20 50 0 58 C-20 50 -38 34 -38 8 V-26 Z" fill="#a855f7"/>
    <path d="M-16 4 l10 10 l20 -22" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
