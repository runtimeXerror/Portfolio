<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Inter, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="x" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg)"/>
  <!-- glow -->
  <circle cx="300" cy="160" r="130" fill="#a855f7" opacity="0.12"/>
  <!-- rocket mark in rounded square -->
  <rect x="250" y="92" width="100" height="100" rx="26" fill="url(#x)"/>
  <text x="300" y="150" font-size="58" text-anchor="middle" dominant-baseline="central">🚀</text>
  <!-- wordmark -->
  <text x="300" y="250" font-size="46" font-weight="800" text-anchor="middle">
    <tspan fill="#ffffff">Launchify</tspan><tspan fill="#a855f7">X</tspan>
  </text>
  <!-- tagline -->
  <text x="300" y="290" font-size="20" font-weight="500" fill="#c4b5fd" text-anchor="middle" letter-spacing="1">Build Fast. Launch Faster.</text>
</svg>
